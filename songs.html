<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Soundtrack 🎵</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <a href="index.html" class="back-link">← Back to Menu</a>
    <h1>Our Playlist 🎵</h1>
    
    <div class="song-form">
      <input type="text" id="song-title" placeholder="Song Name (e.g. Our Favorite)">
      <input type="text" id="youtube-link" placeholder="Paste YouTube Link here">
      <button id="add-song" class="btn-secondary">Add to Playlist</button>
    </div>
  </header>

  <main>
    <div id="songs-list" class="songs-grid">
      </div>
  </main>

  <div id="songModal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="closeModal()">&times;</span>
        
        <h2 id="modalTitle"></h2>
        <div id="videoContainer"></div>
        </div>
</div>

  <script type="module" src="/src/songs.js"></script>
</body>
</html>
