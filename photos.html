<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 📸</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="home-bg">
    <header>
        <a href="index.html" class="back-link">← Back to Menu</a>
        <h1>Our Gallery 📸</h1>
        
        <div class="upload-section">
            <input type="file" id="file-input" accept="image/*" multiple>
            
            <select id="category-select">
                <option value="Us">Us (Together)</option>
                <option value="Roblox">Roblox</option>
                <option value="Haneen">Haneen</option>
                <option value="Josh">Josh</option>
            </select>
            
            <button id="upload-btn">Upload Photos</button>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All Photos</button>
            <button class="filter-btn" data-filter="Us">Us</button>
            <button class="filter-btn" data-filter="Roblox">Roblox</button>
            <button class="filter-btn" data-filter="Haneen">Haneen</button>
            <button class="filter-btn" data-filter="Josh">Josh</button>
        </div>
    </header>

    <main>
        <div id="photo-grid" class="grid"></div>
    </main>

    <script type="module" src="/src/photos.js"></script>
</body>
</html>
