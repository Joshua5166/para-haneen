<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 💌</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="home-bg">
    <header>
        <a href="index.html" class="back-link">← Back</a>
        <h1>Our Memories 💌</h1>
        <p>Write a memory for the box...</p>
    </header>

    <main class="welcome-container">
        <div class="upload-section glass-card" style="margin: 0 auto 30px;">
            <textarea id="memory-input" placeholder="What's a beautiful moment you remember?..." rows="4"></textarea>
            <select id="memory-author">
                <option value="Josh">Josh</option>
                <option value="Haneen">Haneen</option>
            </select>
            <button id="save-memory-btn" class="glass-btn">Drop in the Box 📥</button>
        </div>

        <div class="surprise-section">
            <h2>Feeling nostalgic?</h2>
            <p>Pull a random memory from our box.</p>
            <button id="surprise-btn" class="menu-card" style="cursor: pointer; width: 100%; max-width: 300px; margin: 20px auto;">
                <span class="icon">✨</span>
                <h3>Surprise Me!</h3>
            </button>
        </div>

        <div class="scroll-incentive" onclick="document.getElementById('memories-box-heading').scrollIntoView({ behavior: 'smooth' });">
            <p>Or scroll down to see the whole collection</p>
            <div class="scroll-arrow">↓</div>
        </div>

        <hr style="margin: 30px auto; width: 60%; opacity: 0.2;">

        <div class="all-memories-section" style="max-width: 1000px; margin: 0 auto; padding: 0 20px 50px;">
            <h2 id="memories-box-heading" style="color: #ff4d94; margin-bottom: 10px;">The Memory Box 📮</h2>
            <p style="margin-bottom: 30px; color: #666;">Click on any letter to read its content</p>
            <div id="memories-list" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;"></div>
        </div>
    </main>

    <div id="memoryModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-button" onclick="closeMemoryModal()">&times;</span>
            <div id="memory-display">
                <p id="memory-text"></p>
                <p id="memory-info"></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/memories.js"></script>
</body>
</html>
