<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Movie Theater 🍿</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="home-bg">
    <header>
        <a href="index.html" class="back-link">← Back to Menu</a>
        <h1>Our Cinema 🎬</h1>

        <div class="upload-section">
            <input type="text" id="movie-title" placeholder="Movie Title">
            <input type="text" id="movie-poster" placeholder="Poster URL (from Google)">
            <input type="number" id="movie-rating" placeholder="Rating (1-5)" min="1" max="5">
            <textarea id="movie-comment" placeholder="Your thoughts..."></textarea>
            <button id="add-movie-btn">Add to our Gallery</button>
        </div>
    </header>

    <main>
        <div id="movie-grid" class="movie-grid">
            </div>
    </main>

    <script type="module" src="/src/movies.js"></script>
</body>
</html>
